<head>

<title>Abdulrahman Ahmed Bashir</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#0f2027;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
color:white;
text-align:center;
}

/* العنوان */
h1{
margin-top:40px;
font-size:40px;
background: linear-gradient(90deg, red, blue, lime, cyan, magenta);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: rgbText 5s linear infinite;
}

@keyframes rgbText{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

/* عبدالرحمن.jpeg */
.profile-img{
width:180px;
height:180px;
border-radius:50%;
margin-top:20px;
border:5px solid;
animation: rgbBorder 4s linear infinite;
}

@keyframes rgbBorder{
0%{border-color:red}
25%{border-color:blue}
50%{border-color:lime}
75%{border-color:cyan}
100%{border-color:red}
}

.description{
margin:15px;
font-size:18px;
}

/* أزرار */
.buttons{
margin:20px;
}

.buttons a{
display:inline-block;
margin:8px;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.tiktok{background:black}
.youtube{background:red}
.instagram{background:linear-gradient(45deg,purple,orange)}
.whatsapp{background:green}
.facebook{background:#1877f2}

.buttons a:hover{
transform:scale(1.1);
box-shadow:0 0 15px white;
}

/* أقسام */
.section{
margin-top:40px;
}

.section h2{
font-size:28px;
margin-bottom:15px;
}

/* أزرار الألعاب والتعلم */
.link-btn{
display:inline-block;
margin:10px;
padding:10px 20px;
border-radius:20px;
background:linear-gradient(45deg,orange,yellow);
color:black;
text-decoration:none;
font-weight:bold;
}

.link-btn:hover{
transform:scale(1.1);
}

/* عداد الزوار RGB */
.counter{
margin-top:40px;
font-size:20px;
font-weight:bold;
background: linear-gradient(90deg, red, blue, lime, cyan);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: rgbText 5s linear infinite;
}
</style>
</head>

<body>

<h1>Abdulrahman Ahmed Bashir</h1>

<img class="profile-img" src="عبدالرحمن.jpeg">

<div class="description">
صانع محتوى وجيمر 🎮🔥 يحب البرمجة وتطوير المواقع 💻
</div>

<div class="buttons">

<a class="youtube" href="https://www.youtube.com/@algamers-b7l" target="_blank">YouTube</a>
<a class="instagram" href="https://www.instagram.com/abdulrahmanbashir781" target="_blank">Instagram</a>
<a class="whatsapp" href="https://wa.me/201025474780" target="_blank">WhatsApp</a>
<a class="facebook" href="https://www.facebook.com/share/1CCHyCMEAK/" target="_blank">Facebook</a>
</div>

<div class="section">
<h2>Games</h2>

<a class="link-btn" href="https://www.pubgmobile.com/" target="_blank">PUBG Mobile</a>
<a class="link-btn" href="https://www.crazygames.com/t/football" target="_blank">Football Games</a>
<a class="link-btn" href="https://www.crazygames.com/t/motorcycle" target="_blank">Motorcycle Games</a>

<div class="section">

<a class="link-btn" href="https://quran.com/" target="_blank">القرآن الكريم</a>

<div class="counter">
👀 عدد الزوار: <span id="visits">0</span>
</div>

<script>
if(localStorage.getItem("visits") === null){
localStorage.setItem("visits", 0);
}
let count = parseInt(localStorage.getItem("visits"));
count++;
localStorage.setItem("visits", count);
document.getElementById("visits").innerText = count;
</script>

</html>

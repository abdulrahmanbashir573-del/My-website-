<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulrahman | Gamer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background: radial-gradient(circle at top,#0f0f1a,#000);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
}

/* خلفية نيون متحركة */
body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background: radial-gradient(circle, rgba(0,255,255,0.2), transparent 60%);
top:-100px;
right:-100px;
animation: glow 6s infinite alternate;
}

@keyframes glow{
from{transform:translateY(0);}
to{transform:translateY(80px);}
}

.card{
width:380px;
padding:30px;
border-radius:25px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
box-shadow:0 0 50px rgba(0,255,255,0.3);
text-align:center;
position:relative;
}

.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid #00f5ff;
box-shadow:0 0 30px #00f5ff;
margin-bottom:15px;
}

h1{
font-size:24px;
background:linear-gradient(90deg,#00f5ff,#ff00ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:10px;
}

.desc{
opacity:0.8;
margin-bottom:20px;
}

.links a{
display:block;
margin:10px 0;
padding:12px;
border-radius:15px;
background: rgba(255,255,255,0.08);
color:white;
text-decoration:none;
transition:0.3s;
font-weight:bold;
}

.links a:hover{
background:#00f5ff;
color:black;
transform:scale(1.07);
}

.story{
margin-top:20px;
font-size:14px;
line-height:1.7;
opacity:0.85;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:15px;
}

.counter{
margin-top:15px;
color:#00f5ff;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<img src="عبدالرحمن.jpeg" class="profile">

<h1>Abdulrahman Ahmed</h1>

<div class="desc">
🎮 Elite Gamer | 💻 Future Developer | 🔥 Content Creator
</div>

<div class="links">
<a href="https://www.poki.com" target="_blank">🎮 Play on Poki</a>
<a href="https://poki.com/en/g/subway-surfers" target="_blank">🚆 Subway Surfers</a>
<a href="https://poki.com/en/g/magic-piano-tiles" target="_blank">🎹 Piano Game</a>
<a href="#">📺 YouTube</a>
<a href="#">📸 Instagram</a>
</div>

<div class="story">
💎 ثروتي مش فلوس…  
ثروتي إني ببدأ من الصفر ومبستسلمش.  
كل كود بكتبه بيقربني من حلمي.  
أنا مش بلعب ألعاب بس…  
أنا ببني مستقبلي.
</div>

<div class="counter">
👁 Visitors: <span id="visits">0</span>
</div>

</div>

<script>
if(localStorage.getItem("visits") === null){
localStorage.setItem("visits", 0);
}
let count = parseInt(localStorage.getItem("visits"));
count++;
localStorage.setItem("visits", count);
document.getElementById("visits").innerText = count;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bashir X Calculator</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:Segoe UI;
}

.calculator{
background:rgba(0,0,0,0.8);
padding:25px;
border-radius:25px;
box-shadow:0 0 40px #00f5ff, 0 0 60px #ff00ff;
width:340px;
}

.title{
text-align:center;
color:#00f5ff;
font-size:22px;
margin-bottom:15px;
text-shadow:0 0 20px #00f5ff,0 0 40px #ff00ff;
}

.display{
width:100%;
height:60px;
font-size:22px;
border:none;
border-radius:15px;
margin-bottom:15px;
padding:10px;
text-align:right;
background:#111;
color:white;
box-shadow:0 0 15px #00f5ff inset;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:18px;
font-size:18px;
border:none;
border-radius:15px;
cursor:pointer;
background:#1f1f1f;
color:white;
transition:0.3s;
box-shadow:0 0 10px #000;
}

button:hover{
background:#00f5ff;
color:black;
transform:scale(1.08);
box-shadow:0 0 20px #00f5ff;
}

.equal{
background:#ff00ff;
font-weight:bold;
}

.equal:hover{
background:#ff66ff;
box-shadow:0 0 25px #ff00ff;
}

.footer{
text-align:center;
color:#aaa;
margin-top:15px;
font-size:12px;
}
</style>
</head>

<body>

<div class="calculator">
<div class="title">⚡ Bashir X Calculator ⚡</div>

<input type="text" id="display" class="display" readonly>

<div class="buttons">
<button onclick="clearDisplay()">C</button>
<button onclick="add('/')">÷</button>
<button onclick="add('*')">×</button>
<button onclick="add('-')">−</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('+')">+</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('.')">.</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button style="grid-column: span 4;" onclick="add('0')">0</button>
</div>

<div class="footer">
Developed by Abdulrahman
</div>
</div>

<script>
function add(value){
document.getElementById("display").value += value;
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}catch{
alert("خطأ في العملية");
}
}

function clearDisplay(){
document.getElementById("display").value="";
}
</script>

</body>
</html>
